# WhisPress releases are currently made manually with Tools/manual-release.sh.
# This workflow is parked until the GitHub Actions release path is ready,
# including Developer ID signing, notarization, and final release-channel policy.
#
# It has no tag push trigger on purpose. Manual dispatch requires typing ENABLE
# so an accidental click cannot publish a release.
name: Release (disabled)

on:
  workflow_dispatch:
    inputs:
      enable_release_workflow:
        description: 'Type ENABLE to run this experimental workflow.'
        required: true
        default: ''

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ github.event.inputs.enable_release_workflow == 'ENABLE' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          VERSION=$(/usr/libexec/PlistBuddy -c "Print :CFBundleShortVersionString" Info.plist)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Ensure release tag points at this commit
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          git fetch --tags origin
          if ! git rev-parse "$TAG^{commit}" >/dev/null 2>&1; then
            echo "Missing release tag $TAG. Create and push it before running this workflow." >&2
            exit 1
          fi
          if [ "$(git rev-parse "$TAG^{commit}")" != "$(git rev-parse HEAD)" ]; then
            echo "Release tag $TAG does not point at this commit." >&2
            exit 1
          fi

      - name: Ensure WordPress.com OAuth secret is configured
        env:
          WPCOM_OAUTH_CLIENT_SECRET: ${{ secrets.WPCOM_OAUTH_CLIENT_SECRET }}
        run: |
          if [ -z "$WPCOM_OAUTH_CLIENT_SECRET" ]; then
            echo "Missing WPCOM_OAUTH_CLIENT_SECRET repository secret." >&2
            exit 1
          fi

      - name: Build universal app
        env:
          WPCOM_OAUTH_CLIENT_SECRET: ${{ secrets.WPCOM_OAUTH_CLIENT_SECRET }}
        run: |
          make clean
          make \
            ARCH=universal \
            APP_NAME=WhisPress \
            BUNDLE_ID=com.automattic.whispress \
            CODESIGN_IDENTITY=-

      - name: Verify built app
        run: |
          codesign --verify --deep --strict "build/WhisPress.app"
          SECRET_LENGTH=$(plutil -extract WPCOMOAuthClientSecret raw -o - "build/WhisPress.app/Contents/Info.plist" | wc -c | tr -d ' ')
          if [ "$SECRET_LENGTH" -eq 0 ]; then
            echo "Built app is missing WPCOMOAuthClientSecret." >&2
            exit 1
          fi

      - name: Package app
        run: |
          ditto -c -k --sequesterRsrc --keepParent \
            "build/WhisPress.app" \
            "WhisPress-${{ steps.version.outputs.version }}.zip"

      - name: Create GitHub release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: WhisPress ${{ steps.version.outputs.version }}
          body: |
            ## Download

            **WhisPress-${{ steps.version.outputs.version }}.zip** contains a universal macOS build for Apple Silicon and Intel Macs.

            This preview build is ad-hoc signed and is not notarized yet.
          files: |
            WhisPress-${{ steps.version.outputs.version }}.zip
          generate_release_notes: true
          make_latest: true
